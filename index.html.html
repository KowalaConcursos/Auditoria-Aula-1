<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aula 1 — Auditoria (Kowala Concursos)</title>
<style>
body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:#fdfcf7;color:#111827}
.container{max-width:980px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:0} .muted{color:#4b5563}
.section{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;margin:12px 0;padding:14px;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.section h2{margin:0 0 6px 0;font-size:18px}
.controls{display:flex;gap:8px;margin-top:8px} button{border:1px solid #eab308;background:#facc15;color:#111827;padding:8px 12px;border-radius:10px;font-weight:700;cursor:pointer}
button[disabled]{opacity:.5;cursor:not-allowed}
.locked{opacity:.55}
.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:10px 0}
.progress .bar{height:100%;background:#facc15;width:0%}
.checkpoint{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin-top:8px}
.ck-result{margin-top:8px;padding:8px;border-radius:8px;border:1px solid #065f46;background:#ecfdf5;color:#065f46;display:none}
.ck-result.err{border-color:#991b1b;background:#fef2f2;color:#991b1b}
</style>
</head>
<body>
<div class="container">
  <header style="display:flex;align-items:baseline;gap:10px">
    <h1>Kowala Concursos</h1><span class="muted">Aula 1 — Conceitos Básicos de Auditoria e NBC TA 200</span>
  </header>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="sections"></div>
  <footer class="muted" style="margin-top:20px">© 2025 Kowala Concursos — funciona offline. Este material é um <b>resumo estratégico</b>.</footer>
</div>

<script>
const SECTIONS = [{"id": "intro", "title": "Boas-vindas 🌟", "html": "<p>Bem-vindo(a), futuro Auditor Fiscal! 🙌 Esta é a <b>Aula 1</b> do nosso curso de Auditoria. Reforço: este material é um <b>resumo estratégico</b>; a leitura integral das NBCs é indispensável. Nosso foco é <b>absorver conteúdos-chave</b> e <b>resolver muitas questões</b>.</p><p>Você vai estudar em ritmo de aula, com narrativa fluida, exemplos práticos e checkpoints para fixação. 🚀</p>"}, {"id": "motiv", "title": "O sonho na prática ✨", "html": "<p>Visualize-se nomeado(a) <b>Auditor Fiscal</b>: fiscalizando grandes empresas, garantindo bilhões em arrecadação, viabilizando hospitais, escolas e estradas. Uma carreira que permite <b>ajudar seus pais</b>, viajar a serviço e ter qualidade de vida com excelente remuneração. Este é o porquê por trás de cada página estudada.</p>"}, {"id": "siglas", "title": "Siglas e termos essenciais 🔤", "html": "<ul><li><b>NBC</b>: Normas Brasileiras de Contabilidade (emitidas pelo CFC).</li><li><b>NBC TA</b>: Normas Técnicas de Auditoria (aplicáveis à auditoria independente de DC).</li><li><b>NBC TI</b>: Trabalho de Auditoria Interna.</li><li><b>NBC PI</b>: Profissional da Auditoria Interna.</li><li><b>DC</b>: Demonstrações Contábeis.</li><li><b>CFC</b>: Conselho Federal de Contabilidade.</li><li><b>Risco de Auditoria</b>: chance de emitir opinião inadequada sobre DC com distorção relevante.</li><li><b>Evidência de Auditoria</b>: informações usadas para fundamentar as conclusões (documentos, confirmações, observações, reexecuções, analíticos).</li><li><b>Ceticismo Profissional</b>: postura crítica e alerta a inconsistências, sem paranoia.</li></ul><p><b>Dica de prova:</b> as bancas adoram inverter <u>TI</u> e <u>PI</u>. Não caia nessa! 😉</p>"}, {"id": "class_nat", "title": "Classificação — Quanto à <u>natureza</u> 📘", "html": "<p><b>Contábil/Financeira:</b> examina DC para concluir se representam adequadamente a posição e desempenho.</p><p><b>Operacional:</b> avalia <i>eficiência, eficácia e economicidade</i> de processos e programas.</p><p><b>Conformidade:</b> verifica aderência a leis, regulamentos e normas internas.</p><p><i>Exemplo:</i> auditoria em programa de incentivos fiscais: checa legalidade (conformidade) e resultados (operacional).</p>"}, {"id": "class_vinc", "title": "Classificação — Quanto ao <u>vínculo</u> 🔗", "html": "<p><b>Interna:</b> realizada por unidade da própria entidade; apoio à gestão, sem emitir parecer sobre DC.</p><p><b>Externa/Independente:</b> realizada por profissional sem vínculo; emite opinião sobre DC.</p><p><b>Governamental:</b> realizada por órgãos como TCU/CGU ou Secretarias de Fazenda (rotina do Auditor Fiscal).</p><p><i>Exemplo real:</i> sua atuação em posto de fronteira é auditoria governamental de conformidade.</p>"}, {"id": "class_obj", "title": "Classificação — Quanto ao <u>objeto</u> 🎯", "html": "<p>Ambiental, tributária, de TI, trabalhista, de sistemas, entre outras.</p><p>No Fisco, destaque para <b>auditoria tributária</b> e <b>de TI</b> (malhas fiscais, cruzamentos eletrônicos).</p>"}, {"id": "ta200_intro", "title": "NBC TA 200 — Introdução 📗", "html": "<p>A NBC TA 200 estabelece princípios e responsabilidades gerais do auditor independente em trabalhos sobre DC — é a espinha dorsal das demais NBCs TA.</p>"}, {"id": "ta200_obj", "title": "NBC TA 200 — Objetivos gerais 🎯", "html": "<ol><li>Obter <b>segurança razoável</b> de que as DC, como um todo, estão livres de distorção relevante (fraude ou erro).</li><li>Emitir <b>relatório com opinião</b> sobre as DC, com base nas evidências obtidas.</li></ol><p><b>Pegadinha clássica:</b> segurança razoável ≠ segurança absoluta.</p>"}, {"id": "ta200_defs", "title": "NBC TA 200 — Definições essenciais 📑", "html": "<p><b>Segurança razoável:</b> alto nível de segurança, mas não elimina totalmente o risco.</p><p><b>Risco de auditoria:</b> risco de emitir opinião inadequada quando as DC têm distorção relevante.</p><p><b>Evidência de auditoria:</b> base que sustenta as conclusões do auditor.</p>"}, {"id": "ta200_etica", "title": "NBC TA 200 — Requisitos éticos ⚖️", "html": "<p>Integridade, objetividade, competência e zelo, sigilo e comportamento profissional — alinhados ao Código de Ética do Contador.</p><p><i>Exemplo prático:</i> informação fiscal privilegiada <u>nunca</u> pode ser usada para interesse pessoal.</p>"}, {"id": "ta200_ceticismo", "title": "NBC TA 200 — Ceticismo e julgamento 🕵️", "html": "<p><b>Ceticismo</b>: atitude questionadora, alerta a evidências contraditórias.</p><p><b>Julgamento</b>: aplicação de conhecimento técnico + ética para decidir procedimentos e conclusões.</p><p><i>Exemplo:</i> divergência em NF-e? Aumente testes, confirme com terceiros e reavalie riscos.</p>"}, {"id": "ta200_evid", "title": "NBC TA 200 — Evidência e risco 📂", "html": "<p><b>Suficiência</b> = quantidade adequada de evidência. <b>Apropriação</b> = qualidade e confiabilidade da fonte.</p><p>Fontes comuns: inspeção, observação, confirmações externas, reexecuções, procedimentos analíticos.</p><p><b>Risco de auditoria =</b> risco inerente × risco de controle × risco de detecção.</p><p><b>Alerta de prova:</b> indagações sozinhas raramente são evidência suficiente.</p>"}, {"id": "ta200_conf", "title": "NBC TA 200 — Condução em conformidade 📜", "html": "<p>O auditor deve cumprir <b>todas</b> as NBCs TA relevantes. Exigência não aplicável deve ser <b>justificada e documentada</b>.</p>"}, {"id": "resumo", "title": "Resumão Kow 🎯", "html": "<ul><li>Classificação: natureza (contábil/operacional/conformidade), vínculo (interna/externa/governamental) e objeto (tributária, TI etc.).</li><li>NBC TA 200: segurança razoável + opinião fundamentada.</li><li>Definições-chave: risco, evidência, segurança.</li><li>Ética, ceticismo e julgamento: pilares da atuação.</li><li>No dia a dia do Auditor Fiscal: investigar, fiscalizar, proteger o patrimônio público.</li></ul>"}];
const CHECKS = [{"after": "siglas", "type": "single", "question": "O que significa NBC TA?", "options": ["Norma Brasileira de Contabilidade — Técnicas de Auditoria", "Norma Brasileira de Contabilidade — Trabalho de Auditoria Interna"], "answer": 0, "hint": "TA = Técnicas de Auditoria."}, {"after": "class_nat", "type": "single", "question": "Auditoria operacional foca principalmente em:", "options": ["Eficiência, eficácia e economicidade", "Apenas nas Demonstrações Contábeis"], "answer": 0, "hint": "Operacional avalia desempenho, não só DC."}, {"after": "class_vinc", "type": "single", "question": "Auditoria independente é aquela:", "options": ["Executada por profissional sem vínculo com a entidade", "Feita pela área interna da entidade"], "answer": 0, "hint": "Independente = externa."}, {"after": "ta200_obj", "type": "single", "question": "O auditor busca segurança absoluta?", "options": ["Sim", "Não, segurança é razoável"], "answer": 1, "hint": "Segurança razoável ≠ absoluta."}, {"after": "ta200_defs", "type": "single", "question": "Risco de auditoria é:", "options": ["Risco de opinião inadequada sobre DC distorcidas", "A quantidade de documentos coletados"], "answer": 0, "hint": "É sobre a opinião quando há distorção relevante."}, {"after": "ta200_ceticismo", "type": "single", "question": "Ceticismo profissional implica presumir fraude sempre?", "options": ["Sim", "Não"], "answer": 1, "hint": "É postura crítica, não paranoia."}, {"after": "ta200_evid", "type": "single", "question": "Evidência apropriada refere-se a:", "options": ["Qualidade/confiabilidade da fonte", "Quantidade de evidências"], "answer": 0, "hint": "Apropriada = qualidade; suficiente = quantidade."}];
let unlocked = new Set(['intro']);
function $(id){return document.getElementById(id);}
function hasCheckpoint(afterId){return CHECKS.some(c=>c.after===afterId);}
function autoUnlockChain(){let changed=true;while(changed){changed=false;for(let i=0;i<SECTIONS.length-1;i++){const cur=SECTIONS[i].id,nxt=SECTIONS[i+1].id;if(unlocked.has(cur)&&!unlocked.has(nxt)&&!hasCheckpoint(cur)){unlocked.add(nxt);changed=true;}}}}
function render(){autoUnlockChain();const host=$('sections');host.innerHTML='';for(const s of SECTIONS){const isOpen=unlocked.has(s.id);const div=document.createElement('section');div.className='section'+(isOpen?'':' locked');div.id='sec-'+s.id;div.innerHTML=`<h2>${s.title}</h2><div class="body">${s.html}</div><div class="controls">${renderControls(s.id)}</div>${renderCheckpoint(s.id)}`;host.appendChild(div);}updateProgress();}
function renderControls(id){const idx=SECTIONS.findIndex(x=>x.id===id);const prev=idx>0?SECTIONS[idx-1].id:null;const next=idx<SECTIONS.length-1?SECTIONS[idx+1].id:null;const prevBtn=prev?`<button onclick="scrollToSec('${prev}')">⬅️ Anterior</button>`:'';let nextBtn='';if(next){nextBtn=unlocked.has(next)?`<button onclick="scrollToSec('${next}')">Próximo ➡️</button>`:`<button disabled>Trancado 🔒</button>`;}return prevBtn+nextBtn;}
function renderCheckpoint(id){const ck=CHECKS.find(c=>c.after===id);if(!ck) return '';let html=`<div class="checkpoint"><b>Checkpoint 🎯</b><div>${ck.question}</div>`;if(ck.type==='single'){ck.options.forEach((opt,i)=>{html+=`<label style='display:block;margin:4px 0'><input type='radio' name='ck-${id}' value='${i}'> ${opt}</label>`;});html+=`<button onclick="submitCk('${id}')">Responder ✅</button>`;}html+=`<div id="res-${id}" class="ck-result"></div></div>`;return html;}
function submitCk(id){const ck=CHECKS.find(c=>c.after===id);const sel=document.querySelector(`input[name='ck-${id}']:checked`);if(!sel) return alert('Escolha uma alternativa 🙂');const ok=parseInt(sel.value)===ck.answer;const box=$('res-'+id);box.style.display='block';box.className='ck-result '+(ok?'':'err');box.innerHTML=(ok?'✅ Correto. ':'❌ Incorreto. ')+`Gabarito: <b>${ck.options[ck.answer]}</b> — ${ck.hint}`;unlockNext(id);}
function unlockNext(id){const idx=SECTIONS.findIndex(x=>x.id===id);if(idx<SECTIONS.length-1){const next=SECTIONS[idx+1].id;unlocked.add(next);render();scrollToSec(next);}}
function scrollToSec(id){const el=$('sec-'+id);if(el) el.scrollIntoView({behavior:'smooth'});}
function updateProgress(){const total=SECTIONS.length,done=unlocked.size;$('bar').style.width=Math.round(100*done/total)+'%';}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
